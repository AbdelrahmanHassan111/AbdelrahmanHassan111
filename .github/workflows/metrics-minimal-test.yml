# Temporary minimal version — use this ONLY to confirm the token/account itself works,
# with zero optional plugins that could fail. If this succeeds, add plugins back one at a time.
name: Metrics Dashboard

on:
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AbdelrahmanHassan111
          filename: metrics.svg
          template: classic
          base: "header, repositories"
          config_display: compact
